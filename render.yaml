services:
  - type: web
    name: oncohealth
    env: node
    plan: free
    buildCommand: npm install && npm run build && cd backend && npm install && cd ..
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: REACT_APP_BACKEND_URL
        value: ""
